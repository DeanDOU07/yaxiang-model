name: 亚翔集成选股模型-每日信号

on:
  schedule:
    # 交易日收盘后运行 (UTC 07:30 = 北京时间 15:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install akshare pandas numpy

      - name: 运行 Layer 1 + Layer 2
        run: |
          python model_layer1.py

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: model-results-${{ github.run_number }}
          path: outputs/
          retention-days: 30

      - name: 汇总信号变化
        run: |
          echo "=== Layer 2 信号汇总 ==="
          python -c "
import json
try:
    with open('outputs/full_report.json', 'r') as f:
        r = json.load(f)
    print(f'运行日期: {r[\"date\"]}')
    print(f'候选池: {r[\"total_candidates\"]}只')
    print(f'通过Layer1: {r[\"layer1_passed\"]}只')
    print(f'Layer2买入: {r[\"summary\"][\"buy\"]}只')
    print(f'Layer2持有: {r[\"summary\"][\"hold\"]}只')
    print(f'Layer2卖出: {r[\"summary\"][\"sell\"]}只')
    print()
    print('{:<4} {:<10} {:<8} {:<8} {:<6} {:<10}'.format('序','股票','信号','zscore','PE','操作'))
    print('-'*55)
    for i, rec in enumerate(r.get('recommendations',[]),1):
        sig=rec.get('signal_text','?')
        z=rec.get('zscore',0)
        n=rec.get('name','?')
        c=rec.get('code','?')
        pe=rec.get('pe',0)
        if sig=='BUY': act='🟢建仓'
        elif sig=='SELL': act='🔴减仓'
        elif z>0.5: act='⬆持有'
        else: act='⚪观望'
        print('{:<4} {:<10} {:<8} {:<+8.3f} {:<6} {:<10}'.format(i,n,sig,z,pe,act))
        
    buy_count = r['summary']['buy']
    sell_count = r['summary']['sell']
    if buy_count > 0:
        print(f'\n⚠️ 出现{buy_count}个买入信号，建议关注!')
    if sell_count > 0:
        print(f'\n⚠️ 出现{sell_count}个卖出信号，注意减仓!')
except Exception as e:
    print(f'读取报告失败: {e}')
"

      # === 可选: 邮件通知 (需配置GitHub Secrets) ===
      # 配置方法:
      # 1. 打开 GitHub 仓库 → Settings → Secrets and variables → Actions
      # 2. 添加 MAIL_USERNAME = 你的邮箱@qq.com
      # 3. 添加 MAIL_PASSWORD = 邮箱授权码(非登录密码)
      - name: 发送邮件通知
        if: false  # 改为 true 启用
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: 亚翔模型 - 每日信号 (${{ github.run_number }})
          to: ${{secrets.MAIL_USERNAME}}
          from: 亚翔选股模型
          body: |
            模型运行完成，详见附件。
          attachments: outputs/full_report.json,outputs/layer2_signals.json
